name: vscode

on:
  push:
    tags: ["v*"]

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: cd iquantum-vscode && bun run build
      - run: cd iquantum-vscode && bun run package
      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          cd iquantum-vscode
          output=$(bun run publish 2>&1) && echo "$output" || {
            if echo "$output" | grep -q "already exists"; then
              echo "Extension version already published — skipping"
              echo "$output"
            else
              echo "$output"
              exit 1
            fi
          }
