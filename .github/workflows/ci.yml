name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Verify Docker
        run: docker info
      - name: Build all workspaces
        run: bun run build
      - name: Typecheck all workspaces, including v3 packages
        run: bun run typecheck
      - name: Biome lint all workspaces, including v3 packages
        run: bun run lint
      - name: Test all workspaces, including file/web/memory/hooks/skills packages
        run: bun run test
