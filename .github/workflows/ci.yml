name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          cache: "bun"
      - run: bun install --frozen-lockfile
      - run: docker info
      - run: bun run build
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run test
