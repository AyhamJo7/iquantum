apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: iquantum-daemon
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
spec:
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: iquantum-daemon
                port: { number: 80 }
